name: Nightly Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build
        run: pnpm build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Compress
        run: |
          zip -r nodeget-board.zip dist
          tar -czvf nodeget-board.tar.gz dist

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nodeget-board.zip
            nodeget-board.tar.gz
          prerelease: true
          tag_name: nightly
          name: "Nightly Build"
          body: "Auto-generated nightly build from main branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
